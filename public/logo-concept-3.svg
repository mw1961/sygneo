<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 340">
  <rect width="500" height="340" fill="#F8F5F0"/>

  <!-- CONCEPT 3: "The Mark" — אולטרה מינימל: 3 קווים אופקיים + נקודת זהב -->
  <!-- מייצג: פשטות, כוח, בהירות. כמו Hermès או Bottega Veneta -->

  <!-- Three horizontal lines, different widths — like a seal impression -->
  <line x1="192" y1="90"  x2="308" y2="90"  stroke="#1C1A17" stroke-width="5" stroke-linecap="square"/>
  <line x1="210" y1="115" x2="290" y2="115" stroke="#1C1A17" stroke-width="3" stroke-linecap="square"/>
  <line x1="228" y1="140" x2="272" y2="140" stroke="#8B7355" stroke-width="4" stroke-linecap="square"/>

  <!-- Gold accent dot -->
  <circle cx="250" cy="163" r="4" fill="#8B7355"/>

  <!-- Wordmark — larger, commanding -->
  <text x="250" y="225"
    font-family="Georgia, serif" font-size="32" font-weight="300"
    letter-spacing="16" fill="#1C1A17" text-anchor="middle">SYGNEO</text>

  <line x1="170" y1="240" x2="330" y2="240" stroke="#8B7355" stroke-width="0.8"/>

  <text x="250" y="258"
    font-family="Helvetica, Arial, sans-serif" font-size="8" letter-spacing="4.5"
    fill="#8B7355" text-anchor="middle">HERITAGE · LEGACY · TRUST</text>

  <!-- Label -->
  <text x="250" y="328" font-family="Helvetica, Arial, sans-serif" font-size="9"
    fill="#B0A898" text-anchor="middle" letter-spacing="2">CONCEPT 03 — THE MARK</text>
</svg>
