<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 340">
  <rect width="500" height="340" fill="#F8F5F0"/>

  <!-- CONCEPT 1: "The Signet" — חותם שעווה קלאסי, עיגול כפול, ריבוע פנימי מסובב -->

  <!-- Outer ring thick -->
  <circle cx="250" cy="145" r="90" fill="none" stroke="#1C1A17" stroke-width="5"/>
  <!-- Inner ring thin -->
  <circle cx="250" cy="145" r="76" fill="none" stroke="#1C1A17" stroke-width="1.2"/>

  <!-- Square rotated 45° inside -->
  <rect x="214" y="109" width="72" height="72" transform="rotate(45 250 145)"
    fill="none" stroke="#1C1A17" stroke-width="2.5"/>

  <!-- Inner square -->
  <rect x="228" y="123" width="44" height="44" transform="rotate(45 250 145)"
    fill="none" stroke="#1C1A17" stroke-width="1.5"/>

  <!-- Center dot -->
  <circle cx="250" cy="145" r="5" fill="#1C1A17"/>

  <!-- Wordmark -->
  <text x="250" y="268"
    font-family="Georgia, serif" font-size="28" font-weight="400"
    letter-spacing="14" fill="#1C1A17" text-anchor="middle">SYGNEO</text>
  <line x1="178" y1="282" x2="322" y2="282" stroke="#8B7355" stroke-width="1"/>
  <text x="250" y="300"
    font-family="Helvetica, Arial, sans-serif" font-size="8" letter-spacing="4"
    fill="#8B7355" text-anchor="middle">HERITAGE · LEGACY · TRUST</text>

  <!-- Label -->
  <text x="250" y="328" font-family="Helvetica, Arial, sans-serif" font-size="9"
    fill="#B0A898" text-anchor="middle" letter-spacing="2">CONCEPT 01 — THE SIGNET</text>
</svg>
